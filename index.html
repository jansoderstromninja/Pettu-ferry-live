<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; }
  </style>
</head>
<body class="p-4">
  <header class="flex justify-between items-center w-full max-w-md mx-auto mb-6">
    <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-xs uppercase text-slate-400">LIVE</span></div>
    <div class="flex gap-2">
        <button id="langBtn" onclick="nextLang()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition"></button>
        <button onclick="toggleRules()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition">ℹ️</button>
    </div>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    <div id="mapWrapper" class="w-full bg-slate-800 p-2 rounded-3xl"><div id="map" class="w-full h-48 rounded-2xl"></div></div>
    
    <div class="bg-slate-800 p-6 rounded-3xl text-center shadow-xl">
      <h1 id="statusText" class="text-lg font-bold mb-1">...</h1>
      <span id="speedValue" class="text-4xl font-bold text-emerald-400 font-mono-tabular">0.0</span> <span class="text-slate-400">kn</span>
    </div>

    <div class="bg-slate-800 p-4 rounded-3xl grid grid-cols-2 gap-4 text-center text-xs">
      <div>🌡️ <span id="weatherTemp" class="font-mono-tabular">--</span></div>
      <div>💨 <span id="weatherWind" class="font-mono-tabular">--</span></div>
      <div>🚗 <span id="carCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="carLabel"></span></div>
      <div>🚢 <span id="tripCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="tripLabel"></span></div>
    </div>
  </main>

  <div id="rulesModal" class="hidden fixed inset-0 bg-slate-900/95 z-[9999] p-6 overflow-y-auto">
    <div class="max-w-md mx-auto">
      <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
        <h2 id="rulesTitle" class="text-xl font-bold"></h2>
        <button onclick="toggleRules()" class="text-2xl">✕</button>
      </div>
      <div id="rulesContent" class="space-y-6 text-sm text-slate-300"></div>
      <button onclick="toggleRules()" class="mt-8 w-full bg-emerald-600 py-3 rounded-xl font-bold text-white">Stäng / Sulje / Close</button>
    </div>
  </div>

  <footer class="text-center mt-6 text-[10px] text-slate-500 font-mono space-y-1">
    <p>Version 2.26</p>
    <p>Senast uppdaterad: <span id="updateTime">--</span></p>
  </footer>

  <script>
    lucide.createIcons();
    const langs = ['sv', 'fi', 'en'];
    const flags = { 'sv': '🇸🇪', 'fi': '🇫🇮', 'en': '🇬🇧' };
    let currentLang = localStorage.getItem('lang') || 'sv';
    
    const dict = {
      sv: { status: "Ansluter till färjan...", car: "bilar", trip: "turer", rulesTitle: "Regler",
            sec: "Säkerhet", r1: "Släck helljus vid landning", r2: "Stäng av motor & handbroms", r3: "Ingen rökning",
            traf: "Trafik", r4: "Höger fil: Lätta fordon", r5: "Mitten: Endast tunga fordon", r6: "Tung trafik prioriteras" },
      fi: { status: "Yhdistetään lossiin...", car: "autoa", trip: "vuoroa", rulesTitle: "Säännöt",
            sec: "Turvallisuus", r1: "Sammuta ajovalot", r2: "Sammuta moottori ja käsijarru", r3: "Tupakointi kielletty",
            traf: "Liikenne", r4: "Oikea kaista: Henkilöautot", r5: "Keskikaista: Vain raskas liikenne", r6: "Raskas liikenne etusijalla" },
      en: { status: "Connecting to ferry...", car: "cars", trip: "trips", rulesTitle: "Rules",
            sec: "Safety", r1: "Turn off high beams", r2: "Turn off engine & handbrake", r3: "No smoking",
            traf: "Traffic", r4: "Right lane: Passenger cars", r5: "Middle: Heavy vehicles only", r6: "Heavy traffic priority" }
    };

    function toggleRules() { 
        const modal = document.getElementById('rulesModal');
        const mapWrap = document.getElementById('mapWrapper');
        modal.classList.toggle('hidden');
        mapWrap.style.display = modal.classList.contains('hidden') ? 'block' : 'none';
        
        const d = dict[currentLang];
        document.getElementById('rulesTitle').innerText = d.rulesTitle;
        document.getElementById('rulesContent').innerHTML = `
            <section><h3 class="font-bold text-emerald-400 mb-2">${d.sec}</h3>
            <ul class="list-disc ml-4 space-y-1"><li>${d.r1}</li><li>${d.r2}</li><li>${d.r3}</li></ul></section>
            <section><h3 class="font-bold text-emerald-400 mb-2">${d.traf}</h3>
            <ul class="list-disc ml-4 space-y-1"><li>${d.r4}</li><li>${d.r5}</li><li>${d.r6}</li></ul></section>`;
    }

    function nextLang() {
        currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
        localStorage.setItem('lang', currentLang);
        location.reload();
    }

    // UI & Firebase Init
    document.getElementById('langBtn').innerText = flags[currentLang] + " " + currentLang.toUpperCase();
    document.getElementById('statusText').innerText = dict[currentLang].status;
    document.getElementById('carLabel').innerText = dict[currentLang].car;
    document.getElementById('tripLabel').innerText = dict[currentLang].trip;

    firebase.initializeApp({ apiKey: "DIN_API_NYCKEL_HÄR", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app" });
    const db = firebase.database();
    const today = new Date().toISOString().split('T')[0];
    db.ref(`days/${today}/logs`).on('value', s => document.getElementById('carCount').innerText = Object.values(s.val()||{}).reduce((a,b)=>a+(b.delta||0),0));
    db.ref(`turer/${today}`).on('value', s => document.getElementById('tripCount').innerText = s.numChildren());

    const map = L.map('map', { zoomControl: false, dragging: false }).setView([60.0385, 22.9227], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
  </script>
</body>
</html>
