<!DOCTYPE html>
<!-- 
=====================================================
📋 CHANGELOG (PETTU FÄRJA - LIVE-STATUS)
=====================================================
v2.19 - Bytte till Esri Satellitkarta och tog bort CSS-färgfiltret.
v2.18 - Bytte ut kart-emojin mot professionell AIS-markör (cirkel vid kaj, roterande pil vid färd).
v2.17 - Ersatte "Mot"-texten med en visuell grön pil (Pettu ➔ Ulkoluoto) i rubriken.
v2.16 - Ändrade huvudrubrik under färd till destination.
v2.15 - Maxade kontrast för kartfiltret.
v2.14 - Bytte till OpenStreetMap med CSS-invertering.
v2.13 - Lade till live-karta med Leaflet.js.
v2.12 - Ersatte väderstreck med dynamisk SVG-pil.
=====================================================
-->
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live-status (v2.19)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Ikoner & Firebase -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- Leaflet CSS & JS (För Kartan) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; font-variant-numeric: tabular-nums; }
    
    .leaflet-container { background: #0f172a; z-index: 10; font-family: 'Inter', sans-serif; }
    .leaflet-control-attribution { background: rgba(15, 23, 42, 0.7) !important; color: #94a3b8 !important; }
    .leaflet-control-attribution a { color: #38bdf8 !important; }
    
    /* Inget färgfilter behövs längre, satellitkartan är mörk och snygg i sig själv! */
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 selection:bg-teal-500 selection:text-slate-950">

  <header class="flex justify-between items-center w-full max-w-md mx-auto pt-2">
    <div class="flex items-center space-x-2">
      <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
      <span class="text-xs uppercase tracking-wider font-semibold text-slate-400">Live-status</span>
    </div>
    <button id="langBtn" onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 text-sm font-medium px-3 py-1.5 rounded-full border border-slate-700 transition duration-200">
      🇸🇪 SV
    </button>
  </header>

  <main class="w-full max-w-md mx-auto flex-1 flex flex-col justify-center items-center my-8 space-y-4">
    <div id="serviceBanner" class="hidden w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 p-4 rounded-2xl text-center space-y-1">
      <p class="font-bold text-lg" id="serviceTitle">🛠️ Service pågår</p>
      <p class="text-sm opacity-90" id="serviceDesc">Färjan är för tillfället ur ordinarie drift.</p>
    </div>

    <!-- Huvudstatus-kort -->
    <div class="w-full text-center space-y-2 mb-4">
      <h1 id="statusText" class="text-3xl font-bold tracking-tight text-white px-4">Ansluter...</h1>
      <p id="subStatusText" class="text-slate-400 text-base"></p>
    </div>

    <!-- Hastighetsmätare -->
    <div class="bg-slate-800/50 border border-slate-800 p-6 rounded-3xl w-full text-center shadow-xl backdrop-blur-sm">
      <p class="text-xs uppercase tracking-wider font-semibold text-slate-400 mb-1" id="speedLabel">Aktuell hastighet</p>
      <div class="flex items-baseline justify-center space-x-2">
        <span id="speedValue" class="text-6xl font-bold font-mono-tabular text-white transition-all duration-300">0.0</span>
        <span class="text-lg text-slate-400 font-medium">kn</span>
      </div>
      <div class="w-full bg-slate-700 h-1.5 rounded-full mt-4 overflow-hidden">
        <div id="speedBar" class="bg-emerald-500 h-full w-0 transition-all duration-500"></div>
      </div>
    </div>

    <!-- Statistik: Dagens Fordon -->
    <div class="bg-slate-800/30 border border-slate-800/80 p-5 rounded-3xl w-full flex justify-between items-center shadow-lg backdrop-blur-sm">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-slate-700/50 rounded-xl text-slate-300">
          <i data-lucide="car" class="w-5 h-5"></i>
        </div>
        <span class="text-sm uppercase tracking-wider font-semibold text-slate-300" id="vehiclesLabel">Dagens fordon</span>
      </div>
      <span class="text-2xl font-bold font-mono-tabular text-white" id="vehiclesCount">-</span>
    </div>

    <!-- Väder & Vattenstånd -->
    <div class="bg-slate-800/30 border border-slate-800/80 p-4 rounded-3xl w-full flex justify-around items-center shadow-lg backdrop-blur-sm">
      <div class="flex flex-col items-center space-y-1">
        <i data-lucide="thermometer" class="w-5 h-5 text-slate-400"></i>
        <span class="text-sm font-semibold text-white font-mono-tabular" id="weatherTemp">--°C</span>
      </div>
      <div class="flex flex-col items-center space-y-1">
        <i data-lucide="wind" class="w-5 h-5 text-slate-400"></i>
        <div class="flex items-center text-sm font-semibold text-white font-mono-tabular">
          <span id="weatherWind">-- m/s</span>
          <svg id="windArrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ml-1 hidden transition-transform duration-500 text-slate-300">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <polyline points="19 12 12 19 5 12"></polyline>
          </svg>
        </div>
      </div>
      <div class="flex flex-col items-center space-y-1">
        <i data-lucide="waves" class="w-5 h-5 text-slate-400"></i>
        <span class="text-sm font-semibold text-white font-mono-tabular" id="waterLevel">-- cm</span>
      </div>
    </div>

    <!-- Live Karta -->
    <div class="w-full bg-slate-800/30 border border-slate-800/80 p-2 rounded-3xl shadow-lg backdrop-blur-sm">
      <div id="map" class="w-full h-48 rounded-2xl z-0"></div>
    </div>

  </main>

  <footer class="w-full max-w-md mx-auto text-center pb-4 space-y-1">
    <p class="text-xs text-slate-500 font-mono-tabular" id="updateTime">Uppdateras live</p>
    <p class="text-[10px] text-slate-600 font-mono tracking-wider">v2.19</p>
  </footer>

  <script>
    lucide.createIcons();

    const i18n = {
      sv: { 
        speed: "Aktuell hastighet", serviceTitle: "🛠️ Service pågår", serviceDesc: "Färjan är ur drift.", 
        liveText: "Senaste signal från färjan", atDockPettu: "Ligger vid kaj i Pettu ⚓", 
        atDockUto: "Ligger vid kaj i Ulkoluoto ⚓", 
        departedPrefix: "Avgick", 
        moving: "Rör på sig", idle: "Ligger stilla", 
        noData: "Väntar på data... ☕", offline: "Offline 📡", offlineDesc: "Signalen har brutits", vehicles: "Dagens fordon"
      },
      fi: { 
        speed: "Nykyinen nopeus", serviceTitle: "🛠️ Huolto käynnissä", serviceDesc: "Lossi ei ole liikenteessä.", 
        liveText: "Viimeisin signaali lossilta", atDockPettu: "Lossi on laiturissa Petussa ⚓", 
        atDockUto: "Lossi on laiturissa Ulkoluodossa ⚓", 
        departedPrefix: "Lähti", 
        moving: "Liikkeessä", idle: "Paikallaan", 
        noData: "Odotetaan dataa... ☕", offline: "Offline 📡", offlineDesc: "Signaali katkesi", vehicles: "Ajoneuvoja tänään"
      }
    };

    let currentLang = localStorage.getItem('pettu_lang') || 'sv';
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    
    const dbPathTurer = `turer/${todayStr}`; 
    const dbPathLogs = `days/${todayStr}/logs`;
    const dbPathBreadcrumbs = `breadcrumbs/${todayStr}`;

    // FIREBASE INIT
    firebase.initializeApp({
      apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
      authDomain: "fordonsraknare.firebaseapp.com",
      databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fordonsraknare",
      storageBucket: "fordonsraknare.firebasestorage.app",
      messagingSenderId: "260033893182",
      appId: "1:260033893182:web:328da94483ad4b245f926f"
    });

    const db = firebase.database();
    
    let state = {
      turerTs: 0,
      turerFrom: "",
      turerSpeedKnots: 0,
      breadTs: 0,
      breadSpeedKnots: 0,
      breadLat: null,
      breadLng: null,
      heading: 0
    };

    // --- LEAFLET KARTA INIT ---
    let map, ferryMarker;
    function initMap() {
      map = L.map('map', { zoomControl: false, dragging: false, scrollWheelZoom: false }).setView([60.0385, 22.9227], 14);
      
      // Esri Satellitkarta
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri',
        maxZoom: 19
      }).addTo(map);

      // Skapa en initial punkt-markör
      const dotIcon = L.divIcon({
        html: '<div style="width: 14px; height: 14px; background-color: #10b981; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 8px rgba(16,185,129,0.8);"></div>',
        className: '',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });

      ferryMarker = L.marker([60.0385, 22.9227], {icon: dotIcon}).addTo(map);
    }
    initMap();

    // --- VÄDER & VATTENSTÅND ---
    let weatherState = { temp: null, wind: null, gust: null, dirDeg: null };

    async function fetchWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=60.04&longitude=22.92&current=temperature_2m,wind_speed_10m,wind_gusts_10m,wind_direction_10m&wind_speed_unit=ms';
        const res = await fetch(url);
        const data = await res.json();
        
        if(data && data.current) {
          weatherState.temp = Math.round(data.current.temperature_2m);
          weatherState.wind = data.current.wind_speed_10m.toFixed(1);
          weatherState.gust = data.current.wind_gusts_10m ? data.current.wind_gusts_10m.toFixed(1) : weatherState.wind;
          weatherState.dirDeg = data.current.wind_direction_10m;
          renderWeather();
        }
      } catch (error) {
        console.error("Kunde inte hämta väder:", error);
      }
    }

    function renderWeather() {
      if (weatherState.temp === null) return;
      const tempSign = weatherState.temp > 0 ? "+" : "";
      document.getElementById('weatherTemp').innerText = `${tempSign}${weatherState.temp}°C`;
      document.getElementById('weatherWind').innerText = `${weatherState.wind} (${weatherState.gust}) m/s`;
      
      const windArrow = document.getElementById('windArrow');
      windArrow.style.transform = `rotate(${weatherState.dirDeg}deg)`;
      windArrow.classList.remove('hidden');
    }

    async function fetchWaterLevel() {
      try {
        const url = 'https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::mareograph::simple&place=Turku';
        const res = await fetch(url);
        const text = await res.text();
        
        const matches = [...text.matchAll(/<BsWfs:ParameterValue>([^<]+)<\/BsWfs:ParameterValue>/g)];
        if (matches.length > 0) {
          const latestValue = parseFloat(matches[matches.length - 1][1]);
          if (!isNaN(latestValue)) {
            const cm = Math.round(latestValue / 10);
            const sign = cm > 0 ? "+" : "";
            document.getElementById('waterLevel').innerText = `${sign}${cm} cm`;
          }
        }
      } catch (error) {
        console.error("Kunde inte hämta vattenstånd från FMI:", error);
      }
    }

    function fetchExternalData() {
      fetchWeather();
      fetchWaterLevel();
    }
    fetchExternalData();
    setInterval(fetchExternalData, 30 * 60 * 1000);

    // --- DATABAS-LYSSNARE ---
    db.ref(dbPathLogs).on('value', snapshot => {
      let totalVehicles = 0;
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          if (child.val().delta) totalVehicles += child.val().delta;
        });
        document.getElementById('vehiclesCount').innerText = totalVehicles;
      } else {
        document.getElementById('vehiclesCount').innerText = "0";
      }
    });

    db.ref(dbPathTurer).orderByKey().limitToLast(5).on('value', snapshot => {
      let latestSpeed = 0, latestFrom = "", latestTs = 0;
      snapshot.forEach(child => {
        const val = child.val();
        if (val.avgSpeedKnots !== undefined) latestSpeed = val.avgSpeedKnots;
        if (val.from !== undefined) latestFrom = val.from;
        if (val.ts !== undefined && val.ts > latestTs) latestTs = val.ts;
      });
      state.turerTs = latestTs;
      state.turerFrom = latestFrom;
      state.turerSpeedKnots = latestSpeed;
      evaluateAndRender();
    });

    db.ref(dbPathBreadcrumbs).orderByKey().limitToLast(1).on('value', snapshot => {
      snapshot.forEach(child => {
        const val = child.val();
        state.breadTs = val.ts || 0;
        state.breadSpeedKnots = (val.speed || 0) * 1.94384; 
        
        const newLat = val.lat || null;
        const newLng = val.lng || null;

        if (state.breadLat && state.breadLng && newLat && newLng && (state.breadLat !== newLat || state.breadLng !== newLng)) {
           const lat1 = state.breadLat * Math.PI / 180;
           const lat2 = newLat * Math.PI / 180;
           const dLng = (newLng - state.breadLng) * Math.PI / 180;
           const y = Math.sin(dLng) * Math.cos(lat2);
           const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
           state.heading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        state.breadLat = newLat;  
        state.breadLng = newLng;  
      });
      evaluateAndRender();
    });

    function evaluateAndRender() {
      const useBreadcrumb = state.breadTs > state.turerTs;
      const rawDisplaySpeed = useBreadcrumb ? state.breadSpeedKnots : state.turerSpeedKnots;
      const displayTs = Math.max(state.breadTs, state.turerTs);
      
      updateUI({
        avgSpeedKnots: rawDisplaySpeed,
        from: state.turerFrom,
        ts: displayTs
      });
    }

    setInterval(evaluateAndRender, 5000);

    function updateUI(data) {
      if (!data.ts) return; 

      const textEl = document.getElementById('statusText'), 
            subEl = document.getElementById('subStatusText'), 
            speedEl = document.getElementById('speedValue'), 
            speedBar = document.getElementById('speedBar'), 
            lang = i18n[currentLang];
            
      let rawSpeed = parseFloat(data.avgSpeedKnots || 0);
      let isMoving = rawSpeed >= 1.5;
      let displaySpeed = isMoving ? rawSpeed.toFixed(1) : "0.0";
      
      const fromLoc = (data.from || "").toLowerCase();
      const nowMs = Date.now();
      const isOffline = isMoving && (nowMs - data.ts > 600000); 

      // --- Uppdatera kartan (Punkt eller Pil) ---
      if (state.breadLat && state.breadLng && ferryMarker) {
        
        const dotIcon = L.divIcon({
          html: '<div style="width: 14px; height: 14px; background-color: #10b981; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 0 8px rgba(16,185,129,0.8);"></div>',
          className: '', iconSize: [14, 14], iconAnchor: [7, 7]
        });

        const arrowIcon = L.divIcon({
          html: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#10b981" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(${state.heading}deg); filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));"><polygon points="12 2 19 21 12 17 5 21 12 2"></polygon></svg>`,
          className: '', iconSize: [24, 24], iconAnchor: [12, 12]
        });

        ferryMarker.setLatLng([state.breadLat, state.breadLng]);
        
        if(isMoving) {
          ferryMarker.setIcon(arrowIcon);
          map.panTo([state.breadLat, state.breadLng], { animate: true, duration: 1 });
        } else {
          ferryMarker.setIcon(dotIcon);
        }
      }

      let turerTimeStr = new Date(state.turerTs).toLocaleTimeString('sv-FI', { hour: '2-digit', minute: '2-digit' });
      let timePrefix = currentLang === 'sv' ? 'kl.' : 'klo';
      const routeArrow = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="inline mx-1 text-emerald-400 align-text-bottom"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;

      if (isOffline) {
        speedBar.className = "bg-slate-700 h-full transition-all duration-500";
        speedBar.style.width = "0%";
        speedEl.innerText = "-.-";
        subEl.innerText = lang.offlineDesc;
        textEl.innerHTML = lang.offline;
      } else {
        speedEl.innerText = displaySpeed;
        speedBar.style.width = `${Math.min((parseFloat(displaySpeed) / 12) * 100, 100)}%`;

        if (isMoving) {
          speedBar.className = "bg-emerald-500 h-full transition-all duration-500";
          
          if (fromLoc.includes("pettu")) {
            textEl.innerHTML = `Pettu ${routeArrow} Ulkoluoto 🚢`;
          } else if (fromLoc.includes("utö") || fromLoc.includes("uto") || fromLoc.includes("ulkoluoto")) {
            textEl.innerHTML = `Ulkoluoto ${routeArrow} Pettu 🚢`;
          } else {
            textEl.innerHTML = `${lang.moving} 🚢`;
          }

          subEl.innerText = `${lang.moving} (${displaySpeed} kn) • ${lang.departedPrefix} ${timePrefix} ${turerTimeStr}`;
          
        } else {
          speedBar.className = "bg-slate-600 h-full transition-all duration-500";
          subEl.innerText = lang.idle;
          
          if (fromLoc.includes("pettu")) {
            textEl.innerHTML = lang.atDockUto; 
          }
          else if (fromLoc.includes("utö") || fromLoc.includes("uto") || fromLoc.includes("ulkoluoto")) {
            textEl.innerHTML = lang.atDockPettu; 
          }
          else {
            textEl.innerHTML = `${lang.idle} ⚓`;
          }
        }
      }
      
      let timeString = new Date(data.ts).toLocaleTimeString('sv-FI', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('updateTime').innerText = `${lang.liveText} • ${timeString}`;
    }

    function updateLangDOM() {
      const lang = i18n[currentLang];
      document.getElementById('langBtn').innerText = currentLang === 'sv' ? '🇸🇪 SV' : '🇫🇮 FI';
      document.getElementById('speedLabel').innerText = lang.speed;
      document.getElementById('vehiclesLabel').innerText = lang.vehicles;
      renderWeather(); 
      evaluateAndRender();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'sv' ? 'fi' : 'sv';
      localStorage.setItem('pettu_lang', currentLang);
      updateLangDOM();
    }
    updateLangDOM();
  </script>
</body>
</html>
