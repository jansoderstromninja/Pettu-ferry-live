<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; }
    /* CSS för den anpassade rörliga pilen på kartan */
    .moving-ferry-icon {
      color: #10b981;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
      line-height: 1;
    }
  </style>
</head>
<body class="p-4">
  <header class="flex justify-between items-center w-full max-w-md mx-auto mb-6">
    <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-xs uppercase text-slate-400">LIVE</span></div>
    <div class="flex gap-2">
        <button id="langBtn" onclick="nextLang()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition"></button>
        <button onclick="toggleRules()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition">ℹ️</button>
    </div>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    <div id="mapWrapper" class="w-full bg-slate-800 p-2 rounded-3xl"><div id="map" class="w-full h-48 rounded-2xl pointer-events-none"></div></div>
    
    <div class="bg-slate-800 p-6 rounded-3xl text-center shadow-xl">
      <h1 id="statusText" class="text-lg font-bold mb-1">...</h1>
      <span id="speedValue" class="text-4xl font-bold text-emerald-400 font-mono-tabular">0.0</span> <span class="text-slate-400">kn</span>
    </div>

    <div class="bg-slate-800 p-4 rounded-3xl grid grid-cols-2 gap-4 text-center text-xs">
      <div>🌡️ <span id="weatherTemp" class="font-mono-tabular">--</span></div>
      <div>💨 <span id="weatherWind" class="font-mono-tabular">--</span></div>
      <div>🚗 <span id="carCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="carLabel"></span></div>
      <div>🚢 <span id="tripCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="tripLabel"></span></div>
    </div>
  </main>

  <div id="rulesModal" class="hidden fixed inset-0 bg-slate-900 z-[9999] p-6">
    <div class="max-w-md mx-auto h-full flex flex-col">
      <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4">
        <h2 id="rulesTitle" class="text-xl font-bold text-emerald-400"></h2>
        <button onclick="toggleRules()" class="p-2 bg-slate-800 rounded-full">✕</button>
      </div>
      <div id="rulesContent" class="flex-1 overflow-y-auto pr-2 text-sm text-slate-300"></div>
      <button id="rulesCloseBtn" onclick="toggleRules()" class="mt-4 w-full bg-emerald-600 py-4 rounded-2xl font-bold text-white">Stäng</button>
    </div>
  </div>
  
  <footer class="text-center mt-6 text-[10px] text-slate-500 font-mono space-y-1">
    <p>Version 2.41</p>
    <p>Senast uppdaterad: <span id="updateTime">--:--:--</span></p>
  </footer>

  <script>
    const rulesData = {
        sv: { title: "Regler för färjtrafik", close: "Stäng", items: ["Utryckningsfordon och tung trafik kan orsaka ändringar i tidtabellen.", "Dåligt väder eller tekniska fel kan försena färjan.", "Turen körs enbart vid behov.", "Retur till Pettu enligt tidtabell.", "Släck strålkastarna vid färjfästet så föraren inte bländas.", "Se till att ditt fordon inte läcker bränsle eller olja på däck.", "Kör ombord först när bommen är helt uppfälld.", "Höger fil: Lätta fordon. Mittenfilen: Endast tunga fordon.", "Stäng av motorn, släck ljusen och applicera handbromsen.", "Meddela axel- och totalvikt på begäran.", "Farligt gods måste meddelas till föraren innan ombordkörning.", "Kör i land först när det röda ljuset har släckts.", "MC/moped/cykelförare måste se till att de hålls upprätt.", "Rökning förbjuden på däck.", "Följ färjeförarens instruktioner."] },
        fi: { title: "Lossiliikenteen ohjeistus", close: "Sulje", items: ["Hälytysajosta ja raskaan liikenteen kuljetuksesta johtuen voidaan poiketa aikataulusta.", "Huono sää, moottorivika ja huoltotoimenpiteet voivat aiheuttaa muutoksia.", "Aikataulun mukainen vuoro ajetaan vain, jos rannalla on matkustajia.", "Lossi palaa Pettuun niin että ehtii seuraavaan vuoroon.", "Ajovalot on sammutettava rantautuessa.", "Varmista ettei ajoneuvosta valu polttoainetta.", "Ajo lossille vasta kun puomi on täysin ylhäällä.", "Oikea kaista: henkilöautot. Keskikaista: raskas liikenne.", "Sammuta moottori, ajovalot ja laita käsijarru.", "Ilmoita akseli-, teli- ja kokonaispaino pyydettäessä.", "Vaarallisten aineiden kuljetuksesta on ilmoitettava etukäteen.", "Poistuminen punaisen valon sammuttua.", "Kaksipyöräisten pystyssä pysymisestä on huolehdittava.", "Tupakointi kielletty kannella.", "Kuljettajan ohjeita on noudatettava."] },
        en: { title: "Ferry Traffic Regulations", close: "Close", items: ["Schedule may change due to emergency or heavy traffic.", "Bad weather or engine issues may delay the ferry.", "Scheduled trips only if passengers are present.", "Return to Pettu as per schedule.", "Turn off headlights when landing.", "Ensure vehicle does not leak fuel.", "Drive on only when the gate is up.", "Right lane: Passenger cars. Middle: Heavy vehicles.", "Turn off engine, lights and use handbrake.", "Report axle/total weight if asked.", "Notify driver about hazardous materials.", "Exit only after red light is off.", "Motorcyclists: keep vehicle upright.", "No smoking on deck.", "Follow the ferry driver's instructions."] }
    };

    function toggleRules() { 
        const modal = document.getElementById('rulesModal');
        const mapWrap = document.getElementById('mapWrapper');
        modal.classList.toggle('hidden');
        mapWrap.style.display = modal.classList.contains('hidden') ? 'block' : 'none';
        
        const lang = localStorage.getItem('lang') || 'sv';
        document.getElementById('rulesTitle').innerText = rulesData[lang].title;
        document.getElementById('rulesCloseBtn').innerText = rulesData[lang].close;
        
        document.getElementById('rulesContent').innerHTML = 
            `<ul class="list-disc ml-5 space-y-3">` + 
            rulesData[lang].items.map(i => `<li class="border-b border-slate-800 pb-3 pl-1">${i}</li>`).join('') + 
            `</ul>`;
    }

    lucide.createIcons();
    const langs = ['sv', 'fi', 'en'];
    const flags = { 'sv': '🇸🇪', 'fi': '🇫🇮', 'en': '🇬🇧' };
    let currentLang = localStorage.getItem('lang') || 'sv';
    
    const statusDict = {
        sv: { movingPettu: "Mot Pettu", movingMainland: "Mot Utö", dockedPettu: "På Pettu", dockedMainland: "På Utö", moving: "Under körning", error: "Väntar på data..." },
        fi: { movingPettu: "Kohti Pettua", movingMainland: "Kohti Utötä", dockedPettu: "Petussa", dockedMainland: "Utössä", moving: "Liikenteessä", error: "Odottaa tietoja..." },
        en: { movingPettu: "Towards Pettu", movingMainland: "Towards Utö", dockedPettu: "At Pettu", dockedMainland: "At Utö", moving: "Moving", error: "Waiting for data..." }
    };

    const dict = {
      sv: { car: "bilar", trip: "turer" },
      fi: { car: "autoa", trip: "vuoroa" },
      en: { car: "cars", trip: "trips" }
    };

    function nextLang() {
        currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
        localStorage.setItem('lang', currentLang);
        location.reload();
    }

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=60.04&longitude=22.92&current=temperature_2m,wind_speed_10m,wind_gusts_10m,wind_direction_10m&wind_speed_unit=ms');
            const data = await res.json();
            
            document.getElementById('weatherTemp').innerText = Math.round(data.current.temperature_2m) + "°C";
            
            const windSpeed = data.current.wind_speed_10m.toFixed(1);
            const windGusts = data.current.wind_gusts_10m.toFixed(1);
            const windDir = data.current.wind_direction_10m;
            
            document.getElementById('weatherWind').innerHTML = `${windSpeed} (${windGusts}) m/s <span style="display:inline-block; transform:rotate(${windDir}deg); margin-left:2px;">↓</span>`;
        } catch(e) { console.error(e); }
    }
    fetchWeather();

    function updateLastSeen() {
        document.getElementById('updateTime').innerText = new Date().toLocaleTimeString();
    }

    document.getElementById('langBtn').innerText = flags[currentLang] + " " + currentLang.toUpperCase();
    document.getElementById('statusText').innerText = statusDict[currentLang].error;
    document.getElementById('carLabel').innerText = dict[currentLang].car;
    document.getElementById('tripLabel').innerText = dict[currentLang].trip;

    firebase.initializeApp({
      apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
      databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
    });
    
    const db = firebase.database();
    
    const todayDate = new Date();
    const today = new Date(todayDate.getTime() - (todayDate.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    
    db.ref(`days/${today}/logs`).on('value', s => {
        document.getElementById('carCount').innerText = Object.values(s.val()||{}).reduce((a,b)=>a+(b.delta||0),0);
        updateLastSeen();
    });
    
    db.ref(`turer/${today}`).on('value', s => {
        document.getElementById('tripCount').innerText = s.numChildren();
        updateLastSeen();
    });

    const map = L.map('map', { 
        zoomControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false, doubleClickZoom: false, boxZoom: false, keyboard: false 
    }).setView([60.0385, 22.9227], 14);
    
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // Initial markör (bollen vid kaj)
    let ferryMarker = L.circleMarker([60.0385, 22.9227], {
        color: '#10b981',
        fillColor: '#10b981',
        fillOpacity: 1,
        radius: 8
    }).addTo(map);

    let lastLat = null;
    let lastLng = null;
    let currentDirection = "unknown";
    let isMovingMode = false; // Håller koll på om vi visar boll eller pil
    
    const MIDPOINT_LAT = 60.03855; 
    const SPEED_THRESHOLD = 1.8; 

    db.ref(`breadcrumbs/${today}`).orderByKey().limitToLast(1).on('value', snapshot => {
        snapshot.forEach(childSnapshot => {
            const pos = childSnapshot.val();
            
            if (pos && pos.lat && pos.lng) {
                const speedMps = pos.speed || 0;
                const speedKnots = (speedMps * 1.94384).toFixed(1);
                const isCurrentlyMoving = speedKnots >= SPEED_THRESHOLD;
                
                // Räkna ut riktningen i grader (bara om vi rör oss och har en tidigare punkt)
                let headingDegree = 0;
                if (isCurrentlyMoving && lastLat !== null && lastLng !== null) {
                    // atan2 ger vinkeln i radianer, som vi konverterar till grader och justerar för kartans norr-orientering
                    const dy = pos.lat - lastLat;
                    const dx = Math.cos(Math.PI/180 * lastLat) * (pos.lng - lastLng);
                    headingDegree = Math.atan2(dx, dy) * (180 / Math.PI);
                }

                // Byta mellan Cirkel och Pil beroende på fart
                if (isCurrentlyMoving && !isMovingMode) {
                    // Ta bort bollen
                    map.removeLayer(ferryMarker);
                    // Skapa pilen (använder DivIcon för att kunna rotera text)
                    const arrowIcon = L.divIcon({
                        html: `<div style="transform: rotate(${headingDegree}deg);" class="moving-ferry-icon">➤</div>`,
                        className: '', // Tar bort default bakgrund
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    ferryMarker = L.marker([pos.lat, pos.lng], { icon: arrowIcon }).addTo(map);
                    isMovingMode = true;
                } 
                else if (!isCurrentlyMoving && isMovingMode) {
                    // Ta bort pilen
                    map.removeLayer(ferryMarker);
                    // Tillbaka till bollen
                    ferryMarker = L.circleMarker([pos.lat, pos.lng], {
                        color: '#10b981', fillColor: '#10b981', fillOpacity: 1, radius: 8
                    }).addTo(map);
                    isMovingMode = false;
                }

                // Uppdatera markörens position (och rotation om det är en pil)
                if (isMovingMode) {
                    const arrowIcon = L.divIcon({
                        html: `<div style="transform: rotate(${headingDegree - 90}deg);" class="moving-ferry-icon">➤</div>`,
                        className: '',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    ferryMarker.setLatLng([pos.lat, pos.lng]);
                    ferryMarker.setIcon(arrowIcon);
                } else {
                    ferryMarker.setLatLng([pos.lat, pos.lng]);
                }
                
                map.panTo([pos.lat, pos.lng]);

                // Uppdatera texter
                document.getElementById('speedValue').innerText = isCurrentlyMoving ? speedKnots : "0.0";

                if (lastLat !== null && isCurrentlyMoving) {
                    if (pos.lat < lastLat - 0.00001) currentDirection = "pettu";
                    else if (pos.lat > lastLat + 0.00001) currentDirection = "mainland";
                }

                const isPettuSide = pos.lat < MIDPOINT_LAT;

                if (isCurrentlyMoving) {
                    if (currentDirection === "pettu") document.getElementById('statusText').innerText = statusDict[currentLang].movingPettu;
                    else if (currentDirection === "mainland") document.getElementById('statusText').innerText = statusDict[currentLang].movingMainland;
                    else document.getElementById('statusText').innerText = statusDict[currentLang].moving; 
                } else {
                    document.getElementById('statusText').innerText = isPettuSide ? statusDict[currentLang].dockedPettu : statusDict[currentLang].dockedMainland;
                }
                
                // Spara för nästa runda
                lastLat = pos.lat;
                lastLng = pos.lng;
                
                updateLastSeen();
            }
        });
    });
  </script>
</body>
</html>
