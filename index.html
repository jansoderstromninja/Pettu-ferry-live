<!DOCTYPE html>
<!-- 
=====================================================
📋 CHANGELOG (PETTU FÄRJA - LIVE-STATUS)
=====================================================
v2.3 - Integrerade breadcrumbs-noden för live-hastighet (konverterar m/s till knop).
v2.2 - Lade till en heartbeat-timer (setInterval) för säker offline-tvingning.
v2.1 - Lade till live-räknare för "Dagens fordon" från logs-noden.
v2.0 - Tog bort timeout för stillaliggande färja.
v1.9 - Smart inaktivitet: 10 min timeout om färjan kör.
=====================================================
-->
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live-status (v2.3)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 selection:bg-teal-500 selection:text-slate-950">

  <header class="flex justify-between items-center w-full max-w-md mx-auto pt-2">
    <div class="flex items-center space-x-2">
      <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
      <span class="text-xs uppercase tracking-wider font-semibold text-slate-400">Live-status</span>
    </div>
    <button id="langBtn" onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 text-sm font-medium px-3 py-1.5 rounded-full border border-slate-700 transition duration-200">
      🇸🇪 SV
    </button>
  </header>

  <main class="w-full max-w-md mx-auto flex-1 flex flex-col justify-center items-center my-8 space-y-6">
    <div id="serviceBanner" class="hidden w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 p-4 rounded-2xl text-center space-y-1">
      <p class="font-bold text-lg" id="serviceTitle">🛠️ Service pågår</p>
      <p class="text-sm opacity-90" id="serviceDesc">Färjan är för tillfället ur ordinarie drift.</p>
    </div>

    <!-- Huvudstatus-kort -->
    <div class="w-full text-center space-y-2 mb-4">
      <h1 id="statusText" class="text-3xl font-bold tracking-tight text-white px-4">Ansluter...</h1>
      <p id="subStatusText" class="text-slate-400 text-base"></p>
    </div>

    <!-- Hastighetsmätare -->
    <div class="bg-slate-800/50 border border-slate-800 p-6 rounded-3xl w-full text-center shadow-xl backdrop-blur-sm">
      <p class="text-xs uppercase tracking-wider font-semibold text-slate-400 mb-1" id="speedLabel">Aktuell hastighet</p>
      <div class="flex items-baseline justify-center space-x-2">
        <span id="speedValue" class="text-6xl font-bold font-mono-tabular text-white transition-all duration-300">0.0</span>
        <span class="text-lg text-slate-400 font-medium">kn</span>
      </div>
      <div class="w-full bg-slate-700 h-1.5 rounded-full mt-4 overflow-hidden">
        <div id="speedBar" class="bg-emerald-500 h-full w-0 transition-all duration-500"></div>
      </div>
    </div>

    <!-- Statistik: Dagens Fordon -->
    <div class="bg-slate-800/30 border border-slate-800/80 p-5 rounded-3xl w-full flex justify-between items-center shadow-lg backdrop-blur-sm">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-slate-700/50 rounded-xl text-slate-300">
          <i data-lucide="car" class="w-5 h-5"></i>
        </div>
        <span class="text-sm uppercase tracking-wider font-semibold text-slate-300" id="vehiclesLabel">Dagens fordon</span>
      </div>
      <span class="text-2xl font-bold font-mono-tabular text-white" id="vehiclesCount">-</span>
    </div>
  </main>

  <footer class="w-full max-w-md mx-auto text-center pb-4 space-y-1">
    <p class="text-xs text-slate-500 font-mono-tabular" id="updateTime">Uppdateras live</p>
    <p class="text-[10px] text-slate-600 font-mono tracking-wider">v2.3</p>
  </footer>

  <script>
    lucide.createIcons();

    const i18n = {
      sv: { 
        speed: "Aktuell hastighet", serviceTitle: "🛠️ Service pågår", serviceDesc: "Färjan är ur drift.", 
        liveText: "Senaste signal från färjan", atDockPettu: "Ligger vid kaj i Pettu ⚓", 
        atDockUto: "Ligger vid kaj i Ulkoluoto ⚓", enRouteFromPettu: "Har avgått från Pettu 🚢", 
        enRouteFromUto: "Har avgått från Ulkoluoto 🚢", moving: "Rör på sig", idle: "Ligger stilla", 
        noData: "Väntar på data... ☕", offline: "Offline 📡", offlineDesc: "Signalen har brutits", vehicles: "Dagens fordon"
      },
      fi: { 
        speed: "Nykyinen nopeus", serviceTitle: "🛠️ Huolto käynnissä", serviceDesc: "Lossi ei ole liikenteessä.", 
        liveText: "Viimeisin signaali lossilta", atDockPettu: "Lossi on laiturissa Petussa ⚓", 
        atDockUto: "Lossi on laiturissa Ulkoluodossa ⚓", enRouteFromPettu: "Lähtenyt Petusta 🚢", 
        enRouteFromUto: "Lähtenyt Ulkoluodosta 🚢", moving: "Liikkeessä", idle: "Paikallaan", 
        noData: "Odotetaan dataa... ☕", offline: "Offline 📡", offlineDesc: "Signaali katkesi", vehicles: "Ajoneuvoja tänään"
      }
    };

    let currentLang = localStorage.getItem('pettu_lang') || 'sv';
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    
    const dbPathTurer = `turer/${todayStr}`; 
    const dbPathLogs = `days/${todayStr}/logs`;
    const dbPathBreadcrumbs = `breadcrumbs/${todayStr}`;

    firebase.initializeApp({
      apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
      authDomain: "fordonsraknare.firebaseapp.com",
      databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fordonsraknare",
      storageBucket: "fordonsraknare.firebasestorage.app",
      messagingSenderId: "260033893182",
      appId: "1:260033893182:web:328da94483ad4b245f926f"
    });

    const db = firebase.database();
    
    // Delad state för att kombinera data från Turer och Breadcrumbs
    let state = {
      turerTs: 0,
      turerFrom: "",
      turerSpeedKnots: 0,
      breadTs: 0,
      breadSpeedKnots: 0
    };

    // 1. Lyssna på Fordonsloggar
    db.ref(dbPathLogs).on('value', snapshot => {
      let totalVehicles = 0;
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          if (child.val().delta) totalVehicles += child.val().delta;
        });
        document.getElementById('vehiclesCount').innerText = totalVehicles;
      } else {
        document.getElementById('vehiclesCount').innerText = "0";
      }
    });

    // 2. Lyssna på Turer (Ger oss bryggan och ankomst-nollning)
    db.ref(dbPathTurer).orderByKey().limitToLast(5).on('value', snapshot => {
      let latestSpeed = 0, latestFrom = "", latestTs = 0;
      snapshot.forEach(child => {
        const val = child.val();
        if (val.avgSpeedKnots !== undefined) latestSpeed = val.avgSpeedKnots;
        if (val.from !== undefined) latestFrom = val.from;
        if (val.ts !== undefined && val.ts > latestTs) latestTs = val.ts;
      });
      state.turerTs = latestTs;
      state.turerFrom = latestFrom;
      state.turerSpeedKnots = latestSpeed;
      evaluateAndRender();
    });

    // 3. Lyssna på Breadcrumbs (Ger oss live-fart ute på vattnet var 15:e sekund)
    db.ref(dbPathBreadcrumbs).orderByKey().limitToLast(1).on('value', snapshot => {
      snapshot.forEach(child => {
        const val = child.val();
        state.breadTs = val.ts || 0;
        // Konvertera GPS-hastighet (m/s) till knop
        state.breadSpeedKnots = (val.speed || 0) * 1.94384; 
      });
      evaluateAndRender();
    });

    // Utvärdera vilken data som är färskast och rendera UI
    function evaluateAndRender() {
      // Om brödsmulan är nyare än sista turen, är vi ute på vattnet och rör oss
      const useBreadcrumb = state.breadTs > state.turerTs;
      
      const displaySpeed = useBreadcrumb ? state.breadSpeedKnots : state.turerSpeedKnots;
      const displayTs = Math.max(state.breadTs, state.turerTs);
      
      updateUI({
        avgSpeedKnots: displaySpeed,
        from: state.turerFrom, // 'from' hämtas alltid från turer-noden
        ts: displayTs
      });
    }

    // TICKANDE KLOCKA: Tvingar omvärdering av Offline-gränsen var 5:e sekund
    setInterval(evaluateAndRender, 5000);

    function updateUI(data) {
      if (!data.ts) return; // Inget att visa ännu

      const textEl = document.getElementById('statusText'), 
            subEl = document.getElementById('subStatusText'), 
            speedEl = document.getElementById('speedValue'), 
            speedBar = document.getElementById('speedBar'), 
            lang = i18n[currentLang];
            
      const speed = parseFloat(data.avgSpeedKnots || 0).toFixed(1);
      const fromLoc = (data.from || "").toLowerCase();
      
      // Vi betraktar farten som stillastående om den är under 0.5 knop
      const isMoving = speed > 0.5;
      
      const nowMs = Date.now();
      // Offline triggas bara om vi var i rörelse och datan är äldre än 10 minuter
      const isOffline = isMoving && (nowMs - data.ts > 600000); 

      if (isOffline) {
        speedBar.className = "bg-slate-700 h-full transition-all duration-500";
        speedBar.style.width = "0%";
        speedEl.innerText = "-.-";
        subEl.innerText = lang.offlineDesc;
        textEl.innerText = lang.offline;
      } else {
        speedEl.innerText = speed;
        speedBar.style.width = `${Math.min((speed / 12) * 100, 100)}%`;

        if (isMoving) {
          speedBar.className = "bg-emerald-500 h-full transition-all duration-500";
          subEl.innerText = `${lang.moving} (${speed} kn)`;
          if (fromLoc.includes("pettu")) textEl.innerText = lang.enRouteFromPettu;
          else if (fromLoc.includes("utö") || fromLoc.includes("uto") || fromLoc.includes("ulkoluoto")) textEl.innerText = lang.enRouteFromUto;
          else textEl.innerText = `${lang.moving} 🚢`;
        } else {
          speedBar.className = "bg-slate-600 h-full transition-all duration-500";
          subEl.innerText = lang.idle;
          if (fromLoc.includes("pettu")) textEl.innerText = lang.atDockPettu;
          else if (fromLoc.includes("utö") || fromLoc.includes("uto") || fromLoc.includes("ulkoluoto")) textEl.innerText = lang.atDockUto;
          else textEl.innerText = `${lang.idle} ⚓`;
        }
      }
      
      let timeString = new Date(data.ts).toLocaleTimeString('sv-FI', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('updateTime').innerText = `${lang.liveText} • ${timeString}`;
    }

    function updateLangDOM() {
      const lang = i18n[currentLang];
      document.getElementById('langBtn').innerText = currentLang === 'sv' ? '🇸🇪 SV' : '🇫🇮 FI';
      document.getElementById('speedLabel').innerText = lang.speed;
      document.getElementById('vehiclesLabel').innerText = lang.vehicles;
      evaluateAndRender();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'sv' ? 'fi' : 'sv';
      localStorage.setItem('pettu_lang', currentLang);
      updateLangDOM();
    }
    updateLangDOM();
  </script>
</body>
</html>
