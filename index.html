<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live-status (v2.21)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; font-variant-numeric: tabular-nums; }
    .leaflet-container { background: #0f172a; z-index: 10; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 selection:bg-teal-500 selection:text-slate-950">

  <header class="flex justify-between items-center w-full max-w-md mx-auto pt-2 mb-6">
    <div class="flex items-center space-x-2">
      <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
      <span class="text-xs uppercase tracking-wider font-semibold text-slate-400">Live-status</span>
    </div>
    <button id="langBtn" onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 text-sm font-medium px-3 py-1.5 rounded-full border border-slate-700 transition duration-200">
      🇸🇪 SV
    </button>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    
    <!-- Service & Paus Banners -->
    <div id="serviceBanner" class="hidden w-full bg-rose-500/10 border border-rose-500/30 text-rose-400 p-4 rounded-2xl text-center space-y-1">
      <p class="font-bold text-lg" id="serviceTitle">🛠️ Service</p>
    </div>
    <div id="pauseBanner" class="hidden w-full p-4 rounded-2xl text-center space-y-1 shadow-lg backdrop-blur-sm">
      <p class="font-bold text-lg" id="pauseTitle"></p>
      <p class="text-sm opacity-90" id="pauseDesc"></p>
    </div>

    <!-- 1. Karta -->
    <div class="w-full bg-slate-800/30 border border-slate-800/80 p-2 rounded-3xl shadow-lg">
      <div id="map" class="w-full h-48 rounded-2xl"></div>
    </div>

    <!-- 2. Status & Hastighet -->
    <div class="bg-slate-800/50 border border-slate-800 p-6 rounded-3xl w-full text-center shadow-lg">
      <h1 id="statusText" class="text-2xl font-bold text-white mb-4">Ansluter...</h1>
      <div class="flex items-center justify-center space-x-4">
        <div class="flex flex-col items-center">
            <span id="speedValue" class="text-4xl font-bold font-mono-tabular text-emerald-400">0.0</span>
            <span class="text-xs uppercase text-slate-400" id="speedLabel">kn</span>
        </div>
      </div>
    </div>

    <!-- 3. Väder & Fordon -->
    <div class="bg-slate-800/30 border border-slate-800/80 p-4 rounded-3xl w-full flex justify-around items-center shadow-lg">
      <div class="flex flex-col items-center"><i data-lucide="thermometer" class="w-5 h-5 text-slate-400"></i><span class="text-sm font-mono-tabular" id="weatherTemp">--°C</span></div>
      <div class="flex flex-col items-center"><i data-lucide="wind" class="w-5 h-5 text-slate-400"></i><span class="text-sm font-mono-tabular" id="weatherWind">-- m/s</span></div>
      <div class="flex flex-col items-center"><i data-lucide="car" class="w-5 h-5 text-slate-400"></i><span class="text-sm font-mono-tabular" id="vehiclesCount">-</span></div>
    </div>
  </main>

  <footer class="w-full max-w-md mx-auto text-center pt-6 pb-4 opacity-50">
    <p class="text-[10px] font-mono" id="updateTime">v2.21</p>
  </footer>

  <script>
    lucide.createIcons();
    const i18n = {
      sv: { speed: "kn", atDockPettu: "Väntar i Pettu ⚓", atDockUto: "Väntar i Ulkoluoto ⚓", moving: "På väg", idle: "Väntar", vehicles: "Fordon", pauseWarnTitle: "⚠️ Paus om 15 min", pauseWarnDesc: "Rasten hålls i Pettu.", pauseActiveTitle: "☕ Färjan har rast", pauseActiveDesc: "Väntar i Pettu till {time}." },
      fi: { speed: "kn", atDockPettu: "Odottaa Petussa ⚓", atDockUto: "Odottaa Ulkoluodossa ⚓", moving: "Liikkeessä", idle: "Odottaa", vehicles: "Ajoneuvoja", pauseWarnTitle: "⚠️ Tauko 15min päästä", pauseWarnDesc: "Tauko Petussa.", pauseActiveTitle: "☕ Lossilla on tauko", pauseActiveDesc: "Laiturissa Petussa klo {time} asti." }
    };

    let currentLang = localStorage.getItem('pettu_lang') || 'sv';
    
    // [HÄR SKULLE DIN LOGIK OCH FIREBASE-INIT FINNAS - KOPPLA PÅ SAMMA SÄTT SOM FÖRR]
    
    function toggleLanguage() {
      currentLang = currentLang === 'sv' ? 'fi' : 'sv';
      localStorage.setItem('pettu_lang', currentLang);
      location.reload(); // Enkel refresh för att uppdatera alla texter
    }

    // Initiera karta
    function initMap() {
      const map = L.map('map', { zoomControl: false, dragging: false }).setView([60.0385, 22.9227], 14);
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    }
    initMap();
  </script>
</body>
</html>
