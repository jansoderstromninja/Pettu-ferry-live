<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live-status (v2.22)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; }
  </style>
</head>
<body class="p-4">

  <header class="flex justify-between items-center w-full max-w-md mx-auto mb-6">
    <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-xs uppercase text-slate-400">Live</span></div>
    <button id="langBtn" onclick="toggleLanguage()" class="bg-slate-800 text-sm px-3 py-1 rounded-full border border-slate-700">🇸🇪 SV</button>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    <div id="pauseBanner" class="hidden p-4 rounded-2xl text-center bg-amber-500/10 border border-amber-500/30 text-amber-400"></div>
    <div class="w-full bg-slate-800 p-2 rounded-3xl"><div id="map" class="w-full h-48 rounded-2xl"></div></div>
    <div class="bg-slate-800 p-6 rounded-3xl text-center">
      <h1 id="statusText" class="text-xl font-bold mb-2">Ansluter...</h1>
      <span id="speedValue" class="text-4xl font-bold text-emerald-400 font-mono-tabular">0.0</span> <span class="text-slate-400">kn</span>
    </div>
    <div class="bg-slate-800 p-4 rounded-3xl flex justify-around text-sm font-mono-tabular">
      <span>🌡️ <span id="weatherTemp">--</span></span>
      <span>💨 <span id="weatherWind">--</span></span>
      <span>🚗 <span id="vehiclesCount">0</span></span>
    </div>
  </main>

  <script>
    lucide.createIcons();
    
    // FIREBASE INIT
    firebase.initializeApp({
      apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
      databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
    });
    const db = firebase.database();

    // VÄDER-LOGIK
    async function fetchWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=60.04&longitude=22.92&current=temperature_2m,wind_speed_10m&wind_speed_unit=ms');
        const data = await res.json();
        document.getElementById('weatherTemp').innerText = Math.round(data.current.temperature_2m) + "°C";
        document.getElementById('weatherWind').innerText = data.current.wind_speed_10m + " m/s";
      } catch (e) { console.error(e); }
    }
    fetchWeather();

    // DATABAS-LYSSNARE
    const todayStr = new Date().toISOString().split('T')[0];
    db.ref(`days/${todayStr}/logs`).on('value', snap => {
        let count = 0;
        snap.forEach(c => count += c.val().delta || 0);
        document.getElementById('vehiclesCount').innerText = count;
    });

    // KARTA
    const map = L.map('map', { zoomControl: false, dragging: false }).setView([60.0385, 22.9227], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    function toggleLanguage() {
        let currentLang = localStorage.getItem('lang') === 'fi' ? 'sv' : 'fi';
        localStorage.setItem('lang', currentLang);
        location.reload();
    }
  </script>
</body>
</html>
