<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; }
  </style>
</head>
<body class="p-4">
  <header class="flex justify-between items-center w-full max-w-md mx-auto mb-6">
    <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-xs uppercase text-slate-400">LIVE</span></div>
    <button id="langBtn" onclick="nextLang()" class="bg-slate-800 text-sm px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition"></button>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    <div class="w-full bg-slate-800 p-2 rounded-3xl"><div id="map" class="w-full h-48 rounded-2xl"></div></div>
    
    <div class="bg-slate-800 p-6 rounded-3xl text-center shadow-xl">
      <h1 id="statusText" class="text-lg font-bold mb-1">...</h1>
      <span id="speedValue" class="text-4xl font-bold text-emerald-400 font-mono-tabular">0.0</span> <span class="text-slate-400">kn</span>
    </div>

    <div class="bg-slate-800 p-4 rounded-3xl grid grid-cols-2 gap-4 text-center text-xs">
      <div>🌡️ <span id="weatherTemp" class="font-mono-tabular">--</span></div>
      <div>💨 <span id="weatherWind" class="font-mono-tabular">--</span></div>
      <div>🚗 <span id="carCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="carLabel"></span></div>
      <div>🚢 <span id="tripCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="tripLabel"></span></div>
    </div>
  </main>

  <footer class="text-center mt-6 text-[10px] text-slate-500 font-mono space-y-1">
    <p>Version 2.23</p>
    <p>Senast uppdaterad: <span id="updateTime">--</span></p>
  </footer>

  <script>
    lucide.createIcons();
    const langs = ['sv', 'fi', 'en'];
    const flags = { 'sv': '🇸🇪', 'fi': '🇫🇮', 'en': '🇬🇧' };
    let currentLang = localStorage.getItem('lang') || 'sv';
    const dict = {
      sv: { status: "Ansluter till färjan...", car: "bilar", trip: "turer" },
      fi: { status: "Yhdistetään lossiin...", car: "autoa", trip: "vuoroa" },
      en: { status: "Connecting to ferry...", car: "cars", trip: "trips" }
    };

    function nextLang() {
        currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
        localStorage.setItem('lang', currentLang);
        location.reload();
    }

    // Väder-API
    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=60.04&longitude=22.92&current=temperature_2m,wind_speed_10m');
            const data = await res.json();
            document.getElementById('weatherTemp').innerText = Math.round(data.current.temperature_2m) + "°C";
            document.getElementById('weatherWind').innerText = data.current.wind_speed_10m + " m/s";
        } catch(e) { console.error(e); }
    }
    fetchWeather();

    // Firebase & UI
    document.getElementById('langBtn').innerText = flags[currentLang] + " " + currentLang.toUpperCase();
    document.getElementById('statusText').innerText = dict[currentLang].status;
    document.getElementById('carLabel').innerText = dict[currentLang].car;
    document.getElementById('tripLabel').innerText = dict[currentLang].trip;
    document.getElementById('updateTime').innerText = new Date().toLocaleTimeString();

    firebase.initializeApp({
      apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
      databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
    });
    
    const db = firebase.database();
    const today = new Date().toISOString().split('T')[0];
    db.ref(`days/${today}/logs`).on('value', s => document.getElementById('carCount').innerText = Object.values(s.val()||{}).reduce((a,b)=>a+(b.delta||0),0));
    db.ref(`turer/${today}`).on('value', s => document.getElementById('tripCount').innerText = s.numChildren());

    const map = L.map('map', { zoomControl: false, dragging: false }).setView([60.0385, 22.9227], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
  </script>
</body>
</html>
