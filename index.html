<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pettu Färja - Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .font-mono-tabular { font-family: 'JetBrains+Mono', monospace; }
    /* Gör modalen scrollbar */
    #rulesModal { z-index: 9999; }
  </style>
</head>
<body class="p-4">
  <header class="flex justify-between items-center w-full max-w-md mx-auto mb-6">
    <div class="flex items-center space-x-2"><div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div><span class="text-xs uppercase text-slate-400">LIVE</span></div>
    <div class="flex gap-2">
        <button id="langBtn" onclick="nextLang()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition"></button>
        <button onclick="toggleRules()" class="bg-slate-800 text-xs px-3 py-1 rounded-full border border-slate-700 hover:bg-slate-700 transition">ℹ️</button>
    </div>
  </header>

  <main class="w-full max-w-md mx-auto space-y-4">
    <div id="mapWrapper" class="w-full bg-slate-800 p-2 rounded-3xl"><div id="map" class="w-full h-48 rounded-2xl"></div></div>
    
    <div class="bg-slate-800 p-6 rounded-3xl text-center shadow-xl">
      <h1 id="statusText" class="text-lg font-bold mb-1">...</h1>
      <span id="speedValue" class="text-4xl font-bold text-emerald-400 font-mono-tabular">0.0</span> <span class="text-slate-400">kn</span>
    </div>

    <div class="bg-slate-800 p-4 rounded-3xl grid grid-cols-2 gap-4 text-center text-xs">
      <div>🌡️ <span id="weatherTemp" class="font-mono-tabular">--</span></div>
      <div>💨 <span id="weatherWind" class="font-mono-tabular">--</span></div>
      <div>🚗 <span id="carCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="carLabel"></span></div>
      <div>🚢 <span id="tripCount" class="font-mono-tabular font-bold text-emerald-400">0</span> <span id="tripLabel"></span></div>
    </div>
  </main>

  <div id="rulesModal" class="hidden fixed inset-0 bg-slate-900/98 z-[9999] p-6">
    <div class="max-w-md mx-auto h-full flex flex-col">
      <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4">
        <h2 id="rulesTitle" class="text-xl font-bold text-emerald-400"></h2>
        <button onclick="toggleRules()" class="p-2 bg-slate-800 rounded-full">✕</button>
      </div>
      <div id="rulesContent" class="flex-1 overflow-y-auto pr-2 space-y-4 text-sm text-slate-300">
          </div>
      <button onclick="toggleRules()" class="mt-4 w-full bg-emerald-600 py-4 rounded-2xl font-bold text-white">Stäng</button>
    </div>
  </div>

  <script>
    const rulesData = {
        sv: { title: "Lossiliikenteen ohjeistus", items: ["Hälytysajo ja raskas liikenne voi aiheuttaa muutoksia aikatauluun.", "Huono sää/tekniset viat voivat viivästyttää lossia.", "Vuoro ajetaan vain tarvittaessa.", "Palaa Pettuun aikataulun mukaan.", "Sammuta ajovalot rantautuessa.", "Varmista ettei ajoneuvo vuoda öljyä.", "Ajo lossille vasta kun puomi ylhäällä.", "Oikea kaista: henkilöautot. Keskikaista: raskas liikenne.", "Sammuta moottori ja laita käsijarru.", "Ilmoita akselipaino tarvittaessa.", "Vaaralliset aineet: ilmoita ennen ajoa.", "Poistuminen vasta kun valot sammuneet.", "Kaksipyöräiset: huolehdi pystyssä pysymisestä.", "Tupakointi kielletty kannella.", "Kuljettajan ohjeita on noudatettava."] },
        fi: { title: "Lossiliikenteen ohjeistus", items: ["Hälytysajosta ja raskaan liikenteen kuljetuksesta johtuen voidaan poiketa aikataulusta.", "Huono sää, moottorivika ja huoltotoimenpiteet voivat aiheuttaa muutoksia.", "Aikataulun mukainen vuoro ajetaan vain, jos rannalla on matkustajia.", "Lossi palaa Pettuun niin että ehtii seuraavaan vuoroon.", "Ajovalot on sammutettava rantautuessa.", "Varmista ettei ajoneuvosta valu polttoainetta.", "Ajo lossille vasta kun puomi on täysin ylhäällä.", "Oikea kaista: henkilöautot. Keskikaista: raskas liikenne.", "Sammuta moottori, ajovalot ja laita käsijarru.", "Ilmoita akseli-, teli- ja kokonaispaino pyydettäessä.", "Vaarallisten aineiden kuljetuksesta on ilmoitettava etukäteen.", "Poistuminen punaisen valon sammuttua.", "Kaksipyöräisten pystyssä pysymisestä on huolehdittava.", "Tupakointi kielletty kannella.", "Kuljettajan ohjeita on noudatettava."] },
        en: { title: "Ferry Traffic Regulations", items: ["Schedule may change due to emergency or heavy traffic.", "Bad weather or engine issues may delay the ferry.", "Scheduled trips only if passengers are present.", "Return to Pettu as per schedule.", "Turn off headlights when landing.", "Ensure vehicle does not leak fuel.", "Drive on only when boom is up.", "Right lane: Passenger cars. Middle: Heavy vehicles.", "Turn off engine, lights and use handbrake.", "Report axle/total weight if asked.", "Notify driver about hazardous materials.", "Exit only after red light is off.", "Motorcyclists: keep vehicle upright.", "No smoking on deck.", "Follow the ferry driver's instructions."] }
    };

    function toggleRules() { 
        const modal = document.getElementById('rulesModal');
        const mapWrap = document.getElementById('mapWrapper');
        modal.classList.toggle('hidden');
        mapWrap.style.display = modal.classList.contains('hidden') ? 'block' : 'none';
        
        const lang = localStorage.getItem('lang') || 'sv';
        document.getElementById('rulesTitle').innerText = rulesData[lang].title;
        document.getElementById('rulesContent').innerHTML = rulesData[lang].items.map(i => `<p class="border-b border-slate-800 pb-2">🔹 ${i}</p>`).join('');
    }

    // ... (resten av logiken för språk, Firebase, väder osv är densamma som förut)
    lucide.createIcons();
    const langs = ['sv', 'fi', 'en'];
    const flags = { 'sv': '🇸🇪', 'fi': '🇫🇮', 'en': '🇬🇧' };
    let currentLang = localStorage.getItem('lang') || 'sv';
    document.getElementById('langBtn').innerText = flags[currentLang] + " " + currentLang.toUpperCase();
    
    function nextLang() {
        currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
        localStorage.setItem('lang', currentLang);
        location.reload();
    }
  </script>
</body>
</html>
